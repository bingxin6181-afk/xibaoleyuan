<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合作院校 - 戏胞乐园剧团</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .partners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
        }
        
        .partner-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }
        
        .partner-card:hover {
            transform: translateY(-4px);
        }
        
        .partner-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 1rem;
        }
        
        .partner-placeholder {
            width: 100px;
            height: 100px;
            background: var(--bg);
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .partner-name {
            font-weight: 600;
            font-size: 1.125rem;
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">🎭 <span class="site-name">戏胞乐园剧团</span></div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="members.html">成员</a></li>
                <li><a href="plays.html">剧目</a></li>
                <li><a href="gallery.html">照片墙</a></li>
                <li><a href="schedule.html">活动安排</a></li>
                <li><a href="guestbook.html">留言墙</a></li>
                <li><a href="sponsors.html">赞助商</a></li>
            </ul>
        </div>
    </nav>
    
    <!-- 主内容 -->
    <main>
        <section class="section">
            <h2 class="section-title">合作院校与企业</h2>
            <div id="partners-container" class="partners-grid"></div>
        </section>
    </main>
    
    <script src="js/data-manager.js"></script>
    <script src="js/display.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = DataManager.getAll();
            document.querySelectorAll('.site-name').forEach(el => {
                el.textContent = data.theater.name;
            });
            document.title = '合作院校 - ' + data.theater.name;
            
            renderPartners('partners-container');
        });
    </script>
</body>
</html>
